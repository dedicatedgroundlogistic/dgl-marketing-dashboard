<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGL Marketing OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#05035C;--navy2:#0A0875;--navy3:rgba(5,3,92,0.07);
  --green:#77B82A;--green2:#5E9220;--green3:rgba(119,184,42,0.12);
  --bg:#F4F5FA;--white:#fff;
  --text:#1A1B3C;--muted:#6B7280;--light:#9CA3AF;
  --border:#E5E7EB;--border2:#F3F4F6;
  --red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;
  --sw:248px;--sw-collapsed:72px;
  --shadow:0 1px 2px rgba(16,24,40,.04);--shadow-md:0 4px 16px rgba(16,24,40,.08);
}
[data-theme="dark"]{
  --navy:#6C6BFF;--navy2:#8180FF;--navy3:rgba(108,107,255,0.14);
  --green:#8BD645;--green2:#77B82A;--green3:rgba(139,214,69,0.14);
  --bg:#0B0C14;--white:#151626;
  --text:#EDEEFB;--muted:#9799B8;--light:#63658A;
  --border:#262842;--border2:#1D1E33;
  --red:#F87171;--amber:#FBBF24;--blue:#60A5FA;
}
[data-theme="dark"] body{background:var(--bg)}
[data-theme="dark"] .card,[data-theme="dark"] .kcard,[data-theme="dark"] .chart-card,[data-theme="dark"] .tcard,[data-theme="dark"] .acard,[data-theme="dark"] .aicard,[data-theme="dark"] .pcard,[data-theme="dark"] .pdetail,[data-theme="dark"] .team-card,[data-theme="dark"] .promptcard,[data-theme="dark"] .doccard,[data-theme="dark"] .campcard,[data-theme="dark"] .chatbox{background:var(--white)}
[data-theme="dark"] .topbar{background:var(--white)}
[data-theme="dark"] .ktable th{background:var(--bg)}
[data-theme="dark"] .tag{background:var(--bg)}
[data-theme="dark"] .sidebar{background:#07070F}
[data-theme="dark"] .tn-search input,[data-theme="dark"] .sb-search input{color:#fff}
* { transition:background-color .25s ease, border-color .25s ease, color .25s ease; }
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-top{display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--green);color:#fff;font-weight:800;font-size:15px;padding:5px 10px;border-radius:7px;letter-spacing:.3px}
.logo-text{color:#fff;font-weight:700;font-size:13px}
.logo-sub{color:rgba(255,255,255,.35);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-top:6px}
.sb-nav{padding:10px 8px;flex:1}
.nav-label{color:rgba(255,255,255,.25);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(119,184,42,.18);color:#77B82A;font-weight:600}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-pill{margin-left:auto;background:var(--green);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1)}
.user-row{display:flex;align-items:center;gap:10px}
.user-av{width:34px;height:34px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.user-name{color:rgba(255,255,255,.85);font-size:12px;font-weight:700}
.user-role{color:rgba(255,255,255,.38);font-size:10.5px}
.sb-version{color:rgba(255,255,255,.2);font-size:10px;text-align:center;padding:8px 0 0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--text);flex:1}
.topbar-updated{font-size:11px;color:var(--light);background:var(--bg);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.content{flex:1;overflow-y:auto;padding:28px}

/* SECTIONS */
.section{display:none}.section.active{display:block}
.pg-title{font-size:21px;font-weight:800;color:var(--text);margin-bottom:3px}
.pg-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:24px 0 10px}

/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1280px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px}
.card-sm{padding:16px}

/* METRIC CARDS */
.kcard{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.kcard.blue::before{background:var(--blue)}.kcard.amber::before{background:var(--amber)}.kcard.navy::before{background:var(--navy)}.kcard.red::before{background:var(--red)}
.kcard-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.kcard-val{font-size:30px;font-weight:800;color:var(--text);line-height:1;margin-bottom:5px}
.kcard-sub{font-size:12px;color:var(--muted)}
.kcard-trend{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:6px}
.tup{background:#ECFDF5;color:#059669}.tdown{background:#FEF2F2;color:#DC2626}.tneutral{background:var(--bg);color:var(--muted)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-active{background:#ECFDF5;color:#059669}
.b-progress{background:#EFF6FF;color:#2563EB}
.b-pending{background:#FFFBEB;color:#D97706}
.b-paused{background:var(--border2);color:var(--muted)}
.b-live{background:#ECFDF5;color:#059669}
.b-risk{background:#FEF2F2;color:#DC2626}... (Tiempo restante: 97 KB)
