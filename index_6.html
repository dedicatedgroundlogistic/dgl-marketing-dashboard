<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DGL · Marketing Operating System</title>
<style>
/* ============================================================
   DGL MARKETING OPERATING SYSTEM (MOS)
   Sprint 1 — Núcleo + Dashboard ejecutivo
   HTML5 / CSS3 / JavaScript Vanilla — Cero dependencias
   ============================================================ */

/* ---------- TOKENS ---------- */
:root{
  /* Marca */
  --navy:#05035C;
  --green:#77B82A;

  /* Escala derivada del navy (tinte frío) */
  --navy-900:#05035C;
  --navy-800:#0c0a6b;
  --navy-700:#1a1880;
  --navy-600:#2b289c;

  /* Superficies — gris azulado, NO crema */
  --bg:#0a0a1f;            /* lienzo app (modo oscuro lateral) */
  --surface:#ffffff;
  --surface-2:#f7f8fb;
  --surface-3:#eef0f6;
  --line:#e3e6ef;
  --line-strong:#cdd2e0;

  /* Texto */
  --ink:#10122b;
  --ink-2:#3b3f5c;
  --ink-3:#6b7090;
  --ink-faint:#9aa0bd;
  --on-navy:#eceaff;
  --on-navy-dim:#a7a4d8;

  /* Semánticos */
  --ok:#2e9e4f;
  --warn:#d98a00;
  --risk:#d8483f;
  --info:#2b6fd8;

  /* Geometría / movimiento */
  --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:22px;
  --shadow-1:0 1px 2px rgba(16,18,43,.06), 0 1px 3px rgba(16,18,43,.04);
  --shadow-2:0 4px 12px rgba(16,18,43,.07), 0 2px 6px rgba(16,18,43,.05);
  --shadow-3:0 18px 50px rgba(5,3,92,.12), 0 6px 18px rgba(5,3,92,.08);
  --ease:cubic-bezier(.2,.7,.2,1);
  --t:.22s var(--ease);

  --sidebar-w:268px;
  --sidebar-w-collapsed:74px;
  --topbar-h:62px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--surface-2);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:rgba(119,184,42,.28)}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#b3b9cc;background-clip:padding-box}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  transition:grid-template-columns var(--t);
}
.app.collapsed{grid-template-columns:var(--sidebar-w-collapsed) 1fr}

/* ---------- SIDEBAR ---------- */
.sidebar{
  background:
    radial-gradient(120% 80% at 0% 0%, #0c0a6b 0%, var(--navy-900) 46%, #050327 100%);
  color:var(--on-navy);
  display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.06);
  position:relative;z-index:30;
  min-width:0;
}
.brand{
  height:var(--topbar-h);
  display:flex;align-items:center;gap:12px;
  padding:0 18px;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--green),#5fa018);
  display:grid;place-items:center;
  font-weight:800;font-size:15px;color:#06210a;
  box-shadow:0 4px 14px rgba(119,184,42,.4);
  letter-spacing:-.5px;
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;overflow:hidden;white-space:nowrap}
.brand-text b{font-size:14px;font-weight:700;letter-spacing:.2px;color:#fff}
.brand-text span{font-size:10.5px;color:var(--on-navy-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.app.collapsed .brand-text{opacity:0;width:0}

.nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 20px}
.nav::-webkit-scrollbar{width:6px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.nav-section{margin-top:16px}
.nav-section:first-child{margin-top:4px}
.nav-label{
  font-size:10px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--on-navy-dim);padding:6px 12px 4px;font-weight:600;
  white-space:nowrap;overflow:hidden;
}
.app.collapsed .nav-label{opacity:0;height:8px;padding-top:0;padding-bottom:0}

.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 12px;border-radius:10px;
  color:var(--on-navy-dim);font-size:13.5px;font-weight:500;
  position:relative;white-space:nowrap;
  transition:background var(--t),color var(--t);
  margin:1px 0;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0;stroke-width:1.7}
.nav-item .nav-txt{overflow:hidden;transition:opacity var(--t)}
.app.collapsed .nav-item .nav-txt{opacity:0;width:0}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{
  background:linear-gradient(90deg,rgba(119,184,42,.22),rgba(119,184,42,.05));
  color:#fff;
}
.nav-item.active::before{
  content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--green);border-radius:0 3px 3px 0;
}
.nav-badge{
  margin-left:auto;font-size:10.5px;font-weight:700;
  background:var(--green);color:#06210a;
  padding:1px 7px;border-radius:20px;
}
.app.collapsed .nav-badge{display:none}

.sidebar-foot{
  padding:12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;
}
.user-chip{
  display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;
  transition:background var(--t);white-space:nowrap;overflow:hidden;
}
.user-chip:hover{background:rgba(255,255,255,.07)}
.avatar{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#2b289c,#1a1880);
  display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;
  border:1px solid rgba(255,255,255,.14);
}
.user-chip .u-info{line-height:1.2;overflow:hidden}
.user-chip .u-info b{font-size:12.5px;color:#fff;display:block}
.user-chip .u-info span{font-size:11px;color:var(--on-navy-dim)}
.app.collapsed .user-chip .u-info{opacity:0;width:0}

/* ---------- MAIN ---------- */
.main{display:flex;flex-direction:column;min-width:0;background:var(--surface-2)}

.topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;
  padding:0 22px;position:relative;z-index:20;
}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  display:grid;place-items:center;color:var(--ink-2);
  transition:background var(--t),color var(--t);flex-shrink:0;
}
.icon-btn svg{width:19px;height:19px;stroke-width:1.8}
.icon-btn:hover{background:var(--surface-3);color:var(--ink)}

.crumbs{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-3);min-width:0}
.crumbs b{color:var(--ink);font-weight:600}
.crumbs .sep{color:var(--ink-faint)}

.search{
  margin-left:auto;display:flex;align-items:center;gap:9px;
  background:var(--surface-3);border:1px solid transparent;
  padding:8px 13px;border-radius:11px;width:300px;max-width:34vw;
  color:var(--ink-3);transition:border var(--t),background var(--t),box-shadow var(--t);
}
.search:focus-within{background:#fff;border-color:var(--navy-600);box-shadow:0 0 0 3px rgba(43,40,156,.12)}
.search svg{width:16px;height:16px;flex-shrink:0;stroke-width:1.9}
.search input{border:none;background:none;outline:none;flex:1;font-size:13.5px;color:var(--ink);min-width:0}
.search input::placeholder{color:var(--ink-faint)}
.search kbd{
  font-family:var(--font);font-size:10.5px;color:var(--ink-3);
  background:#fff;border:1px solid var(--line-strong);border-bottom-width:2px;
  padding:1px 6px;border-radius:6px;font-weight:600;flex-shrink:0;
}

.top-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.dot-indicator{position:relative}
.dot-indicator::after{
  content:"";position:absolute;top:7px;right:8px;width:7px;height:7px;
  background:var(--risk);border-radius:50%;border:2px solid rgba(255,255,255,.9);
}

/* ---------- CONTENT SCROLL ---------- */
.content{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.view{padding:30px 34px 60px;max-width:1480px;margin:0 auto;animation:viewIn .4s var(--ease)}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- PAGE HEADER ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.page-head .eyebrow{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:8px}
.page-head h1{font-size:27px;font-weight:740;letter-spacing:-.6px;color:var(--ink)}
.page-head p{color:var(--ink-3);font-size:14px;margin-top:6px;max-width:560px;line-height:1.5}
.head-actions{display:flex;gap:10px}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:11px;font-size:13.5px;font-weight:600;
  transition:transform var(--t),box-shadow var(--t),background var(--t),border-color var(--t);
}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(5,3,92,.22)}
.btn-primary:hover{background:var(--navy-700);box-shadow:0 10px 22px rgba(5,3,92,.28)}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong);box-shadow:var(--shadow-1)}
.btn-ghost:hover{border-color:var(--ink-faint);background:var(--surface-2)}
.btn-green{background:var(--green);color:#06210a;box-shadow:0 6px 16px rgba(119,184,42,.3)}
.btn-green:hover{background:#6aa525}

/* ============================================================
   DASHBOARD
   ============================================================ */
.grid{display:grid;gap:18px}
.kpi-row{grid-template-columns:repeat(4,1fr);margin-bottom:18px}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow-1);transition:box-shadow var(--t),transform var(--t),border-color var(--t);
}
.card.hover:hover{box-shadow:var(--shadow-2);transform:translateY(-2px)}

/* KPI card */
.kpi{padding:20px 20px 18px;position:relative;overflow:hidden}
.kpi .kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kpi-icon{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
}
.kpi-icon svg{width:20px;height:20px;stroke-width:1.9}
.kpi-icon.c1{background:rgba(43,40,156,.1);color:var(--navy-600)}
.kpi-icon.c2{background:rgba(119,184,42,.14);color:#5a8d1f}
.kpi-icon.c3{background:rgba(43,111,216,.1);color:var(--info)}
.kpi-icon.c4{background:rgba(217,138,0,.12);color:var(--warn)}
.kpi-delta{font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px}
.kpi-delta svg{width:13px;height:13px;stroke-width:2.5}
.kpi-delta.up{color:var(--ok);background:rgba(46,158,79,.1)}
.kpi-delta.down{color:var(--risk);background:rgba(216,72,63,.1)}
.kpi-val{font-size:30px;font-weight:760;letter-spacing:-1px;color:var(--ink);line-height:1}
.kpi-label{font-size:13px;color:var(--ink-3);margin-top:7px;font-weight:500}
.kpi-spark{position:absolute;right:0;bottom:0;left:0;height:36px;opacity:.5}

/* Section title */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:30px 0 14px}
.sec-head h2{font-size:16px;font-weight:680;letter-spacing:-.3px;color:var(--ink);display:flex;align-items:center;gap:9px}
.sec-head h2 .tag{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);background:var(--surface-3);padding:3px 8px;border-radius:7px}
.sec-head a{font-size:13px;color:var(--navy-600);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.sec-head a svg{width:14px;height:14px;stroke-width:2}
.sec-head a:hover{color:var(--navy)}

.dash-grid{grid-template-columns:1.55fr 1fr;align-items:start}

/* Chart card */
.chart-card{padding:20px 22px 14px}
.chart-card .ch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.chart-card h3{font-size:15px;font-weight:660;color:var(--ink)}
.chart-card .ch-sub{font-size:12.5px;color:var(--ink-3);margin-top:2px}
.legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-weight:500}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* Funnel / pipeline */
.funnel{padding:20px 22px}
.funnel h3{font-size:15px;font-weight:660;margin-bottom:16px}
.stage{margin-bottom:14px}
.stage-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.stage-top b{font-size:13.5px;color:var(--ink);font-weight:600}
.stage-top .n{font-size:13px;color:var(--ink-3);font-weight:600}
.stage-bar{height:9px;border-radius:20px;background:var(--surface-3);overflow:hidden}
.stage-fill{height:100%;border-radius:20px;width:0;transition:width 1s var(--ease)}
.conv{font-size:11px;color:var(--ink-faint);margin-top:4px;font-weight:500}

/* Activity feed */
.feed{padding:8px 8px}
.feed-item{display:flex;gap:13px;padding:11px 14px;border-radius:12px;transition:background var(--t)}
.feed-item:hover{background:var(--surface-2)}
.feed-dot{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
}
.feed-dot svg{width:16px;height:16px;stroke-width:2}
.feed-dot.g{background:rgba(119,184,42,.14);color:#5a8d1f}
.feed-dot.b{background:rgba(43,40,156,.1);color:var(--navy-600)}
.feed-dot.i{background:rgba(43,111,216,.1);color:var(--info)}
.feed-dot.w{background:rgba(217,138,0,.12);color:var(--warn)}
.feed-body{flex:1;min-width:0}
.feed-body p{font-size:13px;color:var(--ink-2);line-height:1.45}
.feed-body p b{color:var(--ink);font-weight:600}
.feed-body time{font-size:11.5px;color:var(--ink-faint);margin-top:2px;display:block}

/* Campaigns table */
.table-card{padding:6px}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;
  color:var(--ink-3);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--line);
}
tbody td{padding:14px 16px;font-size:13.5px;color:var(--ink-2);border-bottom:1px solid var(--surface-3)}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--t)}
tbody tr:hover{background:var(--surface-2)}
.cmp-name{display:flex;align-items:center;gap:11px}
.cmp-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.cmp-name b{color:var(--ink);font-weight:600;font-size:13.5px;display:block}
.cmp-name span{font-size:11.5px;color:var(--ink-faint)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.live{color:var(--ok);background:rgba(46,158,79,.1)}
.badge.plan{color:var(--info);background:rgba(43,111,216,.1)}
.badge.pause{color:var(--warn);background:rgba(217,138,0,.12)}
.mini-bar{width:90px;height:7px;border-radius:20px;background:var(--surface-3);overflow:hidden;display:inline-block;vertical-align:middle}
.mini-bar i{display:block;height:100%;border-radius:20px;background:var(--green)}
.roi{font-weight:700;color:var(--ink)}

/* Right column secondary cards */
.mini-card{padding:18px 20px}
.mini-card h3{font-size:14px;font-weight:660;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mini-card h3 svg{width:17px;height:17px;stroke-width:1.9;color:var(--navy-600)}

.objective{margin-bottom:15px}
.obj-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.obj-top span{font-size:13px;color:var(--ink-2);font-weight:500}
.obj-top b{font-size:13px;color:var(--ink);font-weight:700}
.obj-bar{height:7px;border-radius:20px;background:var(--surface-3);overflow:hidden}
.obj-fill{height:100%;border-radius:20px;width:0;transition:width 1.1s var(--ease)}

.alert{display:flex;gap:11px;padding:12px;border-radius:12px;margin-bottom:9px;border:1px solid var(--line)}
.alert:last-child{margin-bottom:0}
.alert.risk{background:rgba(216,72,63,.05);border-color:rgba(216,72,63,.2)}
.alert.warn{background:rgba(217,138,0,.05);border-color:rgba(217,138,0,.2)}
.alert svg{width:18px;height:18px;flex-shrink:0;stroke-width:2;margin-top:1px}
.alert.risk svg{color:var(--risk)}
.alert.warn svg{color:var(--warn)}
.alert p{font-size:12.5px;color:var(--ink-2);line-height:1.45}
.alert p b{color:var(--ink);font-weight:650}

/* Quick actions */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa{
  display:flex;flex-direction:column;gap:9px;padding:15px;border-radius:13px;
  background:var(--surface-2);border:1px solid var(--line);
  transition:transform var(--t),box-shadow var(--t),border-color var(--t);text-align:left;
}
.qa:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:var(--green)}
.qa-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:#fff;border:1px solid var(--line);color:var(--navy-600)}
.qa-ico svg{width:18px;height:18px;stroke-width:1.9}
.qa b{font-size:13px;color:var(--ink);font-weight:640}
.qa span{font-size:11.5px;color:var(--ink-3);line-height:1.3}

/* ---------- GENERIC MODULE PLACEHOLDER (otros módulos, Sprint 2+) ---------- */
.coming{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:70px 30px;border-radius:var(--r-xl);
  border:1.5px dashed var(--line-strong);background:var(--surface);
  min-height:60vh;
}
.coming .c-ico{width:74px;height:74px;border-radius:20px;display:grid;place-items:center;
  background:linear-gradient(135deg,rgba(5,3,92,.06),rgba(119,184,42,.08));
  color:var(--navy-600);margin-bottom:22px}
.coming .c-ico svg{width:36px;height:36px;stroke-width:1.5}
.coming h2{font-size:22px;font-weight:720;letter-spacing:-.5px;color:var(--ink);margin-bottom:10px}
.coming p{font-size:14.5px;color:var(--ink-3);max-width:480px;line-height:1.6;margin-bottom:8px}
.coming .sprint-tag{margin-top:18px;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--green);
  background:rgba(119,184,42,.12);padding:7px 16px;border-radius:20px;text-transform:uppercase}
.coming ul{margin-top:26px;text-align:left;display:grid;gap:10px;max-width:430px;width:100%}
.coming li{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--ink-2);
  padding:11px 15px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px}
.coming li svg{width:17px;height:17px;color:var(--green);stroke-width:2;flex-shrink:0}

/* ---------- COMMAND PALETTE / SEARCH OVERLAY ---------- */
.overlay{
  position:fixed;inset:0;z-index:100;display:none;
  background:rgba(8,8,24,.42);backdrop-filter:blur(4px);
  align-items:flex-start;justify-content:center;padding-top:13vh;
  animation:fade .18s ease;
}
.overlay.open{display:flex}
@keyframes fade{from{opacity:0}to{opacity:1}}
.palette{
  width:600px;max-width:92vw;background:#fff;border-radius:18px;
  box-shadow:var(--shadow-3);overflow:hidden;animation:rise .24s var(--ease);
  border:1px solid var(--line);
}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.palette-search{display:flex;align-items:center;gap:12px;padding:17px 20px;border-bottom:1px solid var(--line)}
.palette-search svg{width:20px;height:20px;color:var(--ink-3);stroke-width:1.9}
.palette-search input{flex:1;border:none;outline:none;font-size:16px;color:var(--ink);font-family:inherit}
.palette-search input::placeholder{color:var(--ink-faint)}
.palette-search .esc{font-size:11px;color:var(--ink-3);background:var(--surface-3);padding:3px 8px;border-radius:6px;font-weight:600}
.palette-results{max-height:54vh;overflow-y:auto;padding:8px}
.pal-group-label{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:12px 14px 6px}
.pal-item{display:flex;align-items:center;gap:13px;padding:11px 14px;border-radius:11px;cursor:pointer;transition:background var(--t)}
.pal-item.sel,.pal-item:hover{background:var(--surface-2)}
.pal-item .pi-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--surface-3);color:var(--navy-600);flex-shrink:0}
.pal-item .pi-ico svg{width:17px;height:17px;stroke-width:1.9}
.pal-item .pi-body{flex:1;min-width:0}
.pal-item .pi-body b{font-size:13.5px;color:var(--ink);font-weight:600;display:block}
.pal-item .pi-body span{font-size:11.5px;color:var(--ink-3)}
.pal-item .pi-kind{font-size:10.5px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pal-empty{padding:36px;text-align:center;color:var(--ink-3);font-size:13.5px}

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{
  display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;
  padding:13px 17px;border-radius:13px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow-3);animation:toastIn .3s var(--ease);max-width:340px;
}
.toast svg{width:18px;height:18px;color:var(--green);stroke-width:2;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

/* ---------- RESPONSIVE ---------- */
.scrim{display:none}
@media(max-width:1080px){
  .dash-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:860px){

}
@media(max-width:560px){

/* ============================================================
   SPRINT 2 — COMPONENTES DE MÓDULOS
   ============================================================ */
.stat-mini{display:flex;align-items:center;gap:13px;padding:16px 18px}
.stat-mini .kpi-icon svg{width:18px;height:18px}
.sm-val{font-size:22px;font-weight:740;letter-spacing:-.5px;color:var(--ink);line-height:1}
.sm-label{font-size:12px;color:var(--ink-3);margin-top:4px;font-weight:500}

/* Procesos */
.proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.proc-card{text-align:left;padding:20px;display:flex;flex-direction:column;gap:10px;cursor:pointer}
.proc-top{display:flex;align-items:center;justify-content:space-between}
.proc-area{font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--navy-600);background:rgba(43,40,156,.08);padding:3px 9px;border-radius:7px}
.proc-card h3{font-size:15px;font-weight:660;color:var(--ink);line-height:1.3}
.proc-card p{font-size:12.8px;color:var(--ink-3);line-height:1.5;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.proc-foot{display:flex;gap:14px;padding-top:10px;border-top:1px solid var(--surface-3)}
.proc-foot span{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-3);font-weight:500}
.proc-foot svg{width:14px;height:14px;stroke-width:1.9}
.uses{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--green)}
.uses svg{width:14px;height:14px}

/* Modal ficha */
.modal-overlay{position:fixed;inset:0;z-index:120;display:none;align-items:flex-start;justify-content:center;
  padding:6vh 20px;background:rgba(8,8,24,.5);backdrop-filter:blur(5px);overflow-y:auto;animation:fade .18s ease}
.modal-overlay.open{display:flex}
.modal-box{width:860px;max-width:100%;background:#fff;border-radius:20px;box-shadow:var(--shadow-3);
  border:1px solid var(--line);animation:rise .26s var(--ease);margin-bottom:6vh}
.ficha-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:24px 26px 18px;border-bottom:1px solid var(--line)}
.ficha-head h2{font-size:21px;font-weight:720;letter-spacing:-.5px;color:var(--ink);margin-top:10px}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);padding:1px;border-radius:0 0 20px 20px;overflow:hidden}
.ficha-f{background:#fff;padding:16px 22px}
.ficha-f.span2{grid-column:1/-1}
.ficha-l{font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:8px}
.ficha-f p{font-size:13.5px;color:var(--ink-2);line-height:1.55}
.ficha-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.ficha-list li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--ink-2);line-height:1.45}
.ficha-list li svg{width:15px;height:15px;color:var(--green);stroke-width:2.2;flex-shrink:0;margin-top:2px}
.chip{display:inline-block;font-size:12px;font-weight:500;color:var(--ink-2);background:var(--surface-2);

.dif-bar{display:inline-block;width:60px;height:6px;border-radius:20px;background:var(--surface-3);overflow:hidden;vertical-align:middle;margin-right:8px}
.dif-bar i{display:block;height:100%;border-radius:20px}
.dif-n{font-size:12px;color:var(--ink-3);font-weight:600}
.pos-pill{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:8px}

.pos-pill.p2{color:var(--navy-700);background:rgba(43,40,156,.12)}
.pos-pill.p3{color:var(--warn);background:rgba(217,138,0,.12)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;overflow-x:auto;padding-bottom:8px}

.kcol-head{display:flex;align-items:center;gap:8px;padding:13px 15px;font-size:12.5px;font-weight:680;color:var(--ink);border-bottom:1px solid var(--line)}
.kdot{width:9px;height:9px;border-radius:50%}
.kcount{margin-left:auto;font-size:11px;font-weight:700;color:var(--ink-3);background:#fff;border:1px solid var(--line);padding:1px 8px;border-radius:20px}
.kcol-body{padding:10px;display:flex;flex-direction:column;gap:10px;min-height:80px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px;cursor:grab;

.kcard:hover{box-shadow:var(--shadow-2);transform:translateY(-2px);border-color:var(--line-strong)}

.kcard-top b{font-size:13px;font-weight:640;color:var(--ink);line-height:1.3}
.kval{font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}
.kservice{font-size:11.5px;color:var(--ink-3);display:block;margin-bottom:10px}
.kcard-foot{display:flex;align-items:center;justify-content:space-between}
.ktag{font-size:10.5px;font-weight:600;color:var(--navy-600);background:rgba(43,40,156,.08);padding:2px 8px;border-radius:6px}
.kowner{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#2b289c,#1a1880);color:#fff;

/* Content rows */
.content-row{display:grid;grid-template-columns:60px 110px 1fr 110px;align-items:center;gap:16px;padding:15px 20px}
.cr-date{font-size:13px;font-weight:700;color:var(--navy-600)}
.cr-title b{font-size:13.5px;font-weight:620;color:var(--ink);display:block}
.cr-title span{font-size:11.5px;color:var(--ink-faint)}
.cr-status{text-align:right}

/* Playbook rows */
.play-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 14px;border-radius:12px;

.play-row:last-child{margin-bottom:0}
.play-row:hover{border-color:var(--green);background:#fff}
.play-row>svg:first-child{width:18px;height:18px;color:var(--navy-600);stroke-width:1.9;flex-shrink:0}
.play-row>svg:last-child{width:15px;height:15px;color:var(--ink-faint);margin-left:auto;stroke-width:2}
.play-row div{flex:1;min-width:0}
.play-row b{font-size:13px;font-weight:620;color:var(--ink);display:block}
.play-row span{font-size:11.5px;color:var(--ink-3)}

@media(max-width:920px){
  .kanban{grid-template-columns:repeat(5,220px)}
  .ficha-grid{grid-template-columns:1fr}

.src-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--navy-600);background:rgba(43,40,156,.08);padding:4px 10px;border-radius:7px}.src-tag svg{width:13px;height:13px;stroke-width:1.9}

/* ---------- ROUTER (estado en memoria; sin History API por sandbox) ---------- */
let currentRoute='dashboard';
function navigate(route){
  if(!MODULE_META[route]) route='dashboard';
  currentRoute=route;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.route===route));
  document.getElementById('crumbCurrent').textContent = MODULE_META[route].title;
  const content = document.getElementById('content');
  content.scrollTop=0;
  content.innerHTML = route==='dashboard' ? renderDashboard() : renderModule(route);
  if(route==='dashboard') animateDashboard();
  // cerrar menú móvil
  document.getElementById('app').classList.remove('mobile-open');
  // Persistir hash sólo si el entorno lo permite (local). En sandbox (about:srcdoc) se omite.
  try{
    if(window.self===window.top && location.protocol!=='about:' && location.hash!=='#'+route){
      location.hash=route;
    }
  }catch(_){/* iframe sandbox: navegación sólo en memoria */}
}

/* ---------- GRÁFICO SVG (demanda) ---------- */
function buildDemandChart(){
  const host=document.getElementById('demandChart'); if(!host) return;
  const months=['Feb','Mar','Abr','May','Jun','Jul'];
  const rfq=[18,22,20,29,31,38];
  const meet=[4,6,5,8,9,11];
  const W=620,H=210,pad={l:34,r:14,t:14,b:28};
  const max=40;
  const x=i=>pad.l+(i*(W-pad.l-pad.r)/(months.length-1));
  const y=v=>pad.t+(1-v/max)*(H-pad.t-pad.b);
  const line=(arr)=>arr.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const area=(arr)=>line(arr)+` L${x(arr.length-1)} ${H-pad.b} L${x(0)} ${H-pad.b} Z`;
  let grid='';
  for(let g=0;g<=4;g++){const gy=pad.t+g*(H-pad.t-pad.b)/4;grid+=`<line x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}" stroke="#eef0f6" stroke-width="1"/><text x="${pad.l-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="#9aa0bd">${Math.round(max-(g*max/4))}</text>`;}
  let xl='';months.forEach((m,i)=>{xl+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#6b7090">${m}</text>`;});
  const dots=(arr,col)=>arr.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="#fff" stroke="${col}" stroke-width="2"/>`).join('');
  host.innerHTML=`
  <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="overflow:visible">
    <defs>
      <linearGradient id="gradNavy" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#05035C" stop-opacity=".16"/><stop offset="1" stop-color="#05035C" stop-opacity="0"/></linearGradient>
      <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#77B82A" stop-opacity=".2"/><stop offset="1" stop-color="#77B82A" stop-opacity="0"/></linearGradient>
    </defs>
    ${grid}${xl}
    <path d="${area(rfq)}" fill="url(#gradNavy)"/>
    <path d="${area(meet)}" fill="url(#gradGreen)"/>
    <path class="cline" d="${line(rfq)}" fill="none" stroke="#05035C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path class="cline" d="${line(meet)}" fill="none" stroke="#77B82A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots(rfq,'#05035C')}${dots(meet,'#77B82A')}
  </svg>`;
  // animación de trazo
  host.querySelectorAll('.cline').forEach(p=>{
    const len=p.getTotalLength();
    p.style.strokeDasharray=len;p.style.strokeDashoffset=len;
    p.getBoundingClientRect();
    p.style.transition='stroke-dashoffset 1.1s cubic-bezier(.2,.7,.2,1)';
    requestAnimationFrame(()=>{p.style.strokeDashoffset=0;});
  });
}

function animateDashboard(){
  buildDemandChart();
  requestAnimationFrame(()=>{
    document.querySelectorAll('.stage-fill,.obj-fill').forEach(el=>{el.style.width=el.dataset.w+'%';});

}

/* ---------- COMMAND PALETTE / BUSCADOR ---------- */
const SEARCH_INDEX=[
  ...NAV.flatMap(g=>g.items).map(i=>({kind:'Módulo',title:i.label,sub:'Ir al módulo',icon:i.icon,route:i.id})),
  {kind:'SOP',title:'Saneamiento de base de email',sub:'Procesos · Demanda',icon:'doc',route:'marketing'},
  {kind:'Playbook',title:'Motor de autoridad Cross-Border',sub:'Contenido B2B',icon:'book',route:'content'},
  {kind:'KPI',title:'RFQs recibidas',sub:'Métrica de demanda',icon:'target',route:'analytics'},
  {kind:'KPI',title:'Reuniones calificadas',sub:'Métrica comercial',icon:'users',route:'analytics'},
  {kind:'KPI',title:'CAC / LTV',sub:'Eficiencia de adquisición',icon:'analytics',route:'analytics'},
  {kind:'Prompt',title:'Análisis de cuenta prospecto',sub:'IA Center · Claude',icon:'zap',route:'ia'},
  {kind:'Prompt',title:'Generador de speech comercial',sub:'IA Center',icon:'zap',route:'ia'},
  {kind:'Campaña',title:'Freight Forwarders LATAM',sub:'Outbound · Planeada',icon:'flag',route:'marketing'},
];

let palIndex=0, palMatches=[];
function openPalette(){
  document.getElementById('overlay').classList.add('open');
  const inp=document.getElementById('paletteInput');
  inp.value='';inp.focus();runSearch('');
}
function closePalette(){document.getElementById('overlay').classList.remove('open');}
function runSearch(q){
  q=q.trim().toLowerCase();
  palMatches = q? SEARCH_INDEX.filter(i=>(i.title+' '+i.sub+' '+i.kind).toLowerCase().includes(q)) : SEARCH_INDEX;
  palIndex=0;
  const box=document.getElementById('paletteResults');
  if(!palMatches.length){box.innerHTML='<div class="pal-empty">Sin resultados para «'+q+'»</div>';return;}
  // agrupar por kind
  const groups={};palMatches.forEach((m,i)=>{(groups[m.kind]=groups[m.kind]||[]).push({...m,_i:i});});
  box.innerHTML=Object.entries(groups).map(([k,arr])=>`
    <div class="pal-group-label">${k}</div>
    ${arr.map(m=>`
      <div class="pal-item ${m._i===palIndex?'sel':''}" data-i="${m._i}" data-route="${m.route}">
        <div class="pi-ico">${svg(m.icon)}</div>
        <div class="pi-body"><b>${m.title}</b><span>${m.sub}</span></div>
        <span class="pi-kind">${m.kind}</span>
      </div>`).join('')}`).join('');
  box.querySelectorAll('.pal-item').forEach(el=>{
    el.addEventListener('click',()=>{navigate(el.dataset.route);closePalette();});
  });
}
function movePal(d){
  if(!palMatches.length)return;
  palIndex=(palIndex+d+palMatches.length)%palMatches.length;
  document.querySelectorAll('.pal-item').forEach(el=>el.classList.toggle('sel',+el.dataset.i===palIndex));
  const sel=document.querySelector('.pal-item.sel');if(sel)sel.scrollIntoView({block:'nearest'});
}

/* ---------- TOAST ---------- */
function toast(msg){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';t.innerHTML=svg('check')+'<span>'+msg+'</span>';
  wrap.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s, transform .3s';t.style.opacity='0';t.style.transform='translateX(40px)';setTimeout(()=>t.remove(),300);},2800);
}

/* ---------- SIDEBAR TOGGLE ---------- */
function toggleSidebar(){
  const app=document.getElementById('app');
  if(window.innerWidth<=860){app.classList.toggle('mobile-open');}
  else{app.classList.toggle('collapsed');}
}

/* ---------- INIT ---------- */
function init(){
  renderNav();
  document.getElementById('nav').addEventListener('click',e=>{
    const item=e.target.closest('.nav-item');
    if(item){e.preventDefault();navigate(item.dataset.route);}
  });
  document.getElementById('toggleSidebar').addEventListener('click',toggleSidebar);
  document.getElementById('scrim').addEventListener('click',()=>document.getElementById('app').classList.remove('mobile-open'));
  document.getElementById('searchTrigger').addEventListener('click',openPalette);
  document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closePalette();});
  document.getElementById('paletteInput').addEventListener('input',e=>runSearch(e.target.value));

  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette();}
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='b'){e.preventDefault();toggleSidebar();}
    if(e.key==='Escape'){closePalette();closeModal();}
    if(document.getElementById('overlay').classList.contains('open')){
      if(e.key==='ArrowDown'){e.preventDefault();movePal(1);}
      if(e.key==='ArrowUp'){e.preventDefault();movePal(-1);}
      if(e.key==='Enter'){const sel=document.querySelector('.pal-item.sel');if(sel){navigate(sel.dataset.route);closePalette();}}
    }
  });

  // Ruta inicial: lee hash sólo si existe y es válido; si no, dashboard.
  let start='dashboard';
  try{ const h=(location.hash||'').slice(1); if(MODULE_META[h]) start=h; }catch(_){}
  navigate(start);
}
window.addEventListener('hashchange',()=>{
  try{ const r=location.hash.slice(1); if(MODULE_META[r] && r!==currentRoute) navigate(r); }catch(_){}
});
document.addEventListener('DOMContentLoaded',init);
</script>
